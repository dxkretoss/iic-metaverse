  <script>
    // Trigger animations on scroll
    document.addEventListener('DOMContentLoaded', function () {
      // Intersection Observer for fade-in animations
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('animated');
          }
        });
      }, { threshold: 0.1 });

      document.querySelectorAll('.scroll-animate').forEach((el) => {
        observer.observe(el);
      });

      // Parallax effect for the history star
      const historySection = document.querySelector('.section.history');
      const historyStarWrap = document.querySelector('.history-star-wrap');

      if (historySection && historyStarWrap) {
        // Set initial state
        historyStarWrap.style.height = '0%';
        historyStarWrap.style.display = 'flex';
        historyStarWrap.style.alignItems = 'flex-end';

        window.addEventListener('scroll', () => {
          const rect = historySection.getBoundingClientRect();
          const viewHeight = window.innerHeight;

          if (rect.top < viewHeight && rect.bottom > 0) {
            // Calculate progress (0 to 1) based on section position in viewport
            // We want it to start moving when the top of the section is at 80% of the screen
            // and finish when the bottom of the section is at 20%
            const start = viewHeight * 0.8;
            const end = viewHeight * 0.2;
            const progress = (start - rect.top) / (rect.height + (start - end));

            const clampedProgress = Math.max(0, Math.min(1, progress));
            historyStarWrap.style.height = `${clampedProgress * 100}%`;
          }
        });
      }

      // Custom Tab handling for copied metaverse tabs
      const tabLinks = document.querySelectorAll('.core-features-tabs-link');
      const tabPanes = document.querySelectorAll('.core-features-tab-pane');

      tabLinks.forEach(link => {
        link.addEventListener('click', function (e) {
          e.preventDefault();
          const targetTab = this.getAttribute('data-w-tab');

          // Remove active classes from all links in this menu
          const menu = this.closest('.core-features-tabs-menu');
          if (menu) {
            menu.querySelectorAll('.core-features-tabs-link').forEach(l => l.classList.remove('w--current'));
          }
          // Add active class to clicked link
          this.classList.add('w--current');

          // Find the parent tabs container to only affect sibling panes
          const tabsContainer = this.closest('.core-features-tabs');
          if (tabsContainer) {
            const panes = tabsContainer.querySelectorAll('.core-features-tab-pane');
            panes.forEach(pane => {
              if (pane.getAttribute('data-w-tab') === targetTab) {
                pane.classList.add('w--tab-active');
                pane.style.display = 'block';
              } else {
                pane.classList.remove('w--tab-active');
                pane.style.display = 'none';
              }
            });
          }
        });
      });
    });
  </script>

  <script>

    const section = document.querySelector('.scroll-section');
    const cards = document.querySelectorAll('.card');

    window.addEventListener('scroll', () => {

      if (window.innerWidth <= 991) {
        cards.forEach(card => card.style.transform = '');
        return;
      }

      const rect = section.getBoundingClientRect();

      const maxScroll = section.offsetHeight - window.innerHeight;

      const scrollProgress = Math.min(
        Math.max(-rect.top, 0),
        maxScroll
      );

      const progress = scrollProgress / maxScroll;

      cards.forEach((card, index) => {

        // FOR 2 CARDS WITH 560px WIDTH
        const cardWidth = 560;

        // GAP BETWEEN CARDS
        const spacing = cardWidth + 60;

        // CENTER POSITIONING FOR 2 CARDS
        const moveX = (index - 0.5) * spacing * progress;

        // ROTATION EFFECT
        let rotate = 0;

        if (progress < 0.7) {

          const rotateProgress = 1 - (progress / 0.7);

          if (index === 0) rotate = -8 * rotateProgress;
          if (index === 1) rotate = 8 * rotateProgress;
        }

        card.style.transform = `
      translate(-50%, -50%)
      translateX(${moveX}px)
      rotate(${rotate}deg)
    `;

      });

    });

  </script>
  <script>
    // Custom slider for How it Works section
    const howToWorkSection = document.querySelector('.how-to-work-section');
    const slides = document.querySelectorAll('.how-to-work-section .slider-wrapper');
    const tabs = document.querySelectorAll('.how-to-work-section .tab');
    const totalSlides = slides.length;

    // Click to scroll to slide
    tabs.forEach((tab, index) => {
      tab.addEventListener('click', () => {
        if (!howToWorkSection) return;
        const maxScroll = howToWorkSection.offsetHeight - window.innerHeight;
        const targetScroll = (index / totalSlides) * maxScroll;

        // Get absolute top position of the section
        const sectionTop = window.pageYOffset + howToWorkSection.getBoundingClientRect().top;

        window.scrollTo({
          top: sectionTop + targetScroll + 5, // Add a small offset to ensure it triggers the index
          behavior: 'smooth'
        });
      });
    });

    window.addEventListener('scroll', () => {
      if (!howToWorkSection) return;

      if (window.innerWidth <= 991) {
        slides.forEach(slide => {
          slide.classList.remove('active', 'prev', 'next');
          slide.style.transform = '';
          slide.style.opacity = '';
          slide.style.zIndex = '';
        });
        return;
      }

      const rect = howToWorkSection.getBoundingClientRect();
      const maxScroll = howToWorkSection.offsetHeight - window.innerHeight;
      const currentScroll = Math.min(Math.max(-rect.top, 0), maxScroll);
      const progress = currentScroll / maxScroll;
      const activeIndex = Math.min(totalSlides - 1, Math.floor(progress * totalSlides));

      slides.forEach((slide, index) => {
        slide.classList.remove('active', 'prev', 'next');
        slide.style.transform = '';
        slide.style.opacity = '';
        slide.style.zIndex = '';

        const activeHalfWidth = 478; // 956 / 2

        if (index === activeIndex) {
          slide.classList.add('active');
          slide.style.transform = `translate(-50%, -50%) scale(1)`;
          slide.style.zIndex = 10;
          slide.style.opacity = 1;
        } else if (index < activeIndex) {
          slide.classList.add('prev');
          const leftOffset = (activeIndex - index);
          const scale = 0.85 - leftOffset * 0.03; // Slightly larger scale for better visibility
          const nextHalfWidth = (956 * scale) / 2;
          const desiredVisibleWidth = 30 * leftOffset; // 30px bars for better look
          const centerOffset = (activeHalfWidth + desiredVisibleWidth) - nextHalfWidth;

          slide.style.transform = `translate(calc(-50% - ${centerOffset}px), -50%) scale(${scale})`;
          slide.style.zIndex = 5 - leftOffset;
          slide.style.opacity = 0.6; // Keep them visible
        } else if (index > activeIndex) {
          slide.classList.add('next');
          const rightOffset = (index - activeIndex);
          const scale = 0.85 - rightOffset * 0.03;
          const nextHalfWidth = (956 * scale) / 2;
          const desiredVisibleWidth = 30 * rightOffset;
          const centerOffset = (activeHalfWidth + desiredVisibleWidth) - nextHalfWidth;

          slide.style.transform = `translate(calc(-50% + ${centerOffset}px), -50%) scale(${scale})`;
          slide.style.zIndex = 5 - rightOffset;
          slide.style.opacity = 0.6; // Keep them visible
        }

        // Progress line filling logic
        const tab = tabs[index];
        const span = tab.querySelector('.tab-line span');
        if (span) {
          if (index === activeIndex) {
            const slideStart = index / totalSlides;
            const slideEnd = (index + 1) / totalSlides;
            const slideProgress = Math.min(Math.max((progress - slideStart) / (slideEnd - slideStart), 0), 1);
            span.style.width = `${slideProgress * 100}%`;
          } else if (index < activeIndex) {
            span.style.width = '100%';
          } else {
            span.style.width = '0%';
          }
        }
      });

      tabs.forEach((tab, index) => {
        tab.classList.toggle('active', index === activeIndex);
      });
    });
  </script>

  <script>
    // Handle footer subscription form submission
    document.addEventListener('DOMContentLoaded', function () {
      const form = document.getElementById('footer-email-form');
      if (form) {
        form.addEventListener('submit', async function (e) {
          e.preventDefault();

          const emailInput = document.getElementById('footer-email');
          if (!emailInput) return;

          const email = emailInput.value.trim();
          if (!email) return;

          const submitBtn = form.querySelector('.footer-subscribe-button');
          const originalBtnValue = submitBtn ? submitBtn.value : 'Subscribe';

          if (submitBtn) {
            submitBtn.value = 'Subscribing...';
            submitBtn.disabled = true;
          }

          const statusEl = document.getElementById('footer-subscribe-status');
          if (statusEl) {
            statusEl.style.display = 'none';
            statusEl.textContent = '';
          }

          try {
            const response = await fetch('http://localhost:5000/api/subscribe', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({ email: email })
            });

            const result = await response.json();

            if (statusEl) {
              statusEl.style.display = 'block';
              if (response.ok && result.success) {
                statusEl.style.color = '#00ffcc'; // Nice modern success cyan
                statusEl.textContent = result.message || 'Thank you for subscribing to our newsletter!';
                emailInput.value = '';
              } else {
                statusEl.style.color = '#ff6b6b'; // Nice modern error red
                statusEl.textContent = result.error || 'Failed to subscribe. Please try again.';
              }
            }
          } catch (error) {
            console.error('Subscription error:', error);
            if (statusEl) {
              statusEl.style.display = 'block';
              statusEl.style.color = '#ff6b6b';
              statusEl.textContent = 'Unable to connect to server. Please try again later.';
            }
          } finally {
            if (submitBtn) {
              submitBtn.value = originalBtnValue;
              submitBtn.disabled = false;
            }
          }
        });
      }
    });
  </script>
