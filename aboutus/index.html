  <script>
    // Dynamically load about page content from Express/MongoDB server
    (async function loadDynamicAboutContent() {
      const API_URL = 'http://localhost:5000/api/about';
      const BACKEND_URL = 'http://localhost:5000';
      try {
        const response = await fetch(API_URL);
        if (!response.ok) throw new Error('API server unreachable');
        const result = await response.json();
        if (result.success && result.data) {
          const data = result.data;

          // 1. Hero
          const aboutBadgeEl = document.getElementById('about-hero-badge');
          const aboutTitleEl = document.getElementById('about-hero-title');
          const aboutDescEl = document.getElementById('about-hero-desc');

          if (aboutBadgeEl && data.aboutHeroBadge) aboutBadgeEl.textContent = data.aboutHeroBadge;
          if (aboutTitleEl && data.aboutHeroTitle) aboutTitleEl.textContent = data.aboutHeroTitle;
          if (aboutDescEl && data.aboutHeroDescription) aboutDescEl.textContent = data.aboutHeroDescription;

          // 2. Gallery Images
          const galleryLeftEl = document.getElementById('about-gallery-left');
          const galleryCenterEl = document.getElementById('about-gallery-center');
          const galleryRightEl = document.getElementById('about-gallery-right');

          if (galleryLeftEl) {
            if (data.galleryLeftImage) {
              galleryLeftEl.src = data.galleryLeftImage.startsWith('http') ? data.galleryLeftImage : (BACKEND_URL + data.galleryLeftImage);
              galleryLeftEl.style.display = '';
            } else {
              galleryLeftEl.src = '';
              galleryLeftEl.style.display = 'none';
            }
          }
          if (galleryCenterEl) {
            if (data.galleryCenterImage) {
              galleryCenterEl.src = data.galleryCenterImage.startsWith('http') ? data.galleryCenterImage : (BACKEND_URL + data.galleryCenterImage);
              galleryCenterEl.style.display = '';
            } else {
              galleryCenterEl.src = '';
              galleryCenterEl.style.display = 'none';
            }
          }
          if (galleryRightEl) {
            if (data.galleryRightImage) {
              galleryRightEl.src = data.galleryRightImage.startsWith('http') ? data.galleryRightImage : (BACKEND_URL + data.galleryRightImage);
              galleryRightEl.style.display = '';
            } else {
              galleryRightEl.src = '';
              galleryRightEl.style.display = 'none';
            }
          }

          // 3. Gallery Title
          const galleryTitleEl = document.getElementById('about-gallery-title');
          if (galleryTitleEl && data.galleryTitle) {
            galleryTitleEl.textContent = data.galleryTitle;
          }

          // 4. Gallery Paragraphs (HTML Allowed for Bold/Span tags)
          const paragraphsContainer = document.getElementById('about-gallery-paragraphs-container');
          if (paragraphsContainer && data.galleryParagraphs && data.galleryParagraphs.length > 0) {
            paragraphsContainer.innerHTML = '';
            data.galleryParagraphs.forEach(text => {
              if (text && text.trim()) {
                const p = document.createElement('p');
                p.className = 'about-us-gallery-description-text';
                p.innerHTML = text;
                paragraphsContainer.appendChild(p);
              }
            });
          }

          // 5. Leadership (Owner 1 & Owner 2)

          // Owner 1 image
          const owner1ImgEl = document.getElementById('owner1-img');
          if (owner1ImgEl) {
            if (data.owner1Image) {
              owner1ImgEl.src = data.owner1Image.startsWith('http') ? data.owner1Image : (BACKEND_URL + data.owner1Image);
              owner1ImgEl.style.display = '';
            } else {
              owner1ImgEl.src = '';
              owner1ImgEl.style.display = 'none';
            }
          }

          // Owner 1 Badge & Name
          const owner1BadgeEl = document.getElementById('owner1-badge');
          if (owner1BadgeEl && data.owner1Badge) {
            owner1BadgeEl.textContent = data.owner1Badge;
          }
          const owner1NameEl = document.getElementById('owner1-name');
          if (owner1NameEl && data.owner1Name) {
            owner1NameEl.textContent = data.owner1Name;
          }

          // Owner 1 Paragraphs
          const owner1ParagraphsWrap = document.getElementById('owner1-paragraphs-wrap');
          if (owner1ParagraphsWrap && data.owner1Paragraphs && data.owner1Paragraphs.length > 0) {
            owner1ParagraphsWrap.innerHTML = '';
            data.owner1Paragraphs.forEach((text, index) => {
              if (text && text.trim()) {
                const p = document.createElement('p');
                p.className = (index === data.owner1Paragraphs.length - 1) ? 'integrations-description' : 'integrations-description bios';
                p.innerHTML = text;
                owner1ParagraphsWrap.appendChild(p);
              }
            });
          }

          // Owner 2 image
          const owner2ImgEl = document.getElementById('owner2-img');
          if (owner2ImgEl) {
            if (data.owner2Image) {
              owner2ImgEl.src = data.owner2Image.startsWith('http') ? data.owner2Image : (BACKEND_URL + data.owner2Image);
              owner2ImgEl.style.display = '';
            } else {
              owner2ImgEl.src = '';
              owner2ImgEl.style.display = 'none';
            }
          }

          // Owner 2 Badge & Name
          const owner2BadgeEl = document.getElementById('owner2-badge');
          if (owner2BadgeEl && data.owner2Badge) {
            owner2BadgeEl.textContent = data.owner2Badge;
          }
          const owner2NameEl = document.getElementById('owner2-name');
          if (owner2NameEl && data.owner2Name) {
            owner2NameEl.textContent = data.owner2Name;
          }

          // Owner 2 Paragraphs
          const owner2ParagraphsWrap = document.getElementById('owner2-paragraphs-wrap');
          if (owner2ParagraphsWrap && data.owner2Paragraphs && data.owner2Paragraphs.length > 0) {
            owner2ParagraphsWrap.innerHTML = '';
            data.owner2Paragraphs.forEach((text, index) => {
              if (text && text.trim()) {
                const p = document.createElement('p');
                p.className = 'integrations-description bios secont-bio';
                p.innerHTML = text;
                owner2ParagraphsWrap.appendChild(p);
              }
            });
          }

          // 6. Vision & Mission
          const visionImgEl = document.getElementById('vision-img');
          const visionHeadingEl = document.getElementById('vision-heading');
          const visionDescEl = document.getElementById('vision-desc');

          if (visionImgEl && data.visionImage) {
            visionImgEl.src = data.visionImage.startsWith('http') ? data.visionImage : (BACKEND_URL + data.visionImage);
            visionImgEl.srcset = '';
          }
          if (visionHeadingEl && data.visionHeading) visionHeadingEl.textContent = data.visionHeading;
          if (visionDescEl && data.visionDescription) visionDescEl.textContent = data.visionDescription;

          const missionImgEl = document.getElementById('mission-img');
          const missionHeadingEl = document.getElementById('mission-heading');
          const missionDescEl = document.getElementById('mission-desc');

          if (missionImgEl && data.missionImage) {
            missionImgEl.src = data.missionImage.startsWith('http') ? data.missionImage : (BACKEND_URL + data.missionImage);
            missionImgEl.srcset = '';
          }
          if (missionHeadingEl && data.missionHeading) missionHeadingEl.textContent = data.missionHeading;
          if (missionDescEl && data.missionDescription) missionDescEl.textContent = data.missionDescription;

          // 7. Ecosystem
          const ecosystemTitleEl = document.getElementById('ecosystem-title');
          const ecosystemDescWrap = document.getElementById('ecosystem-desc-wrap');
          const ecosystemImgEl = document.getElementById('ecosystem-img');
          const ecosystemBgEl = document.getElementById('ecosystem-bg');

          if (ecosystemTitleEl && data.ecosystemTitle) ecosystemTitleEl.textContent = data.ecosystemTitle;

          if (ecosystemDescWrap && data.ecosystemParagraphs && data.ecosystemParagraphs.length > 0) {
            ecosystemDescWrap.innerHTML = '';
            data.ecosystemParagraphs.forEach(text => {
              if (text && text.trim()) {
                const p = document.createElement('p');

          if (ecosystemImgEl && data.ecosystemImage) {
            ecosystemImgEl.src = data.ecosystemImage.startsWith('http') ? data.ecosystemImage : (BACKEND_URL + data.ecosystemImage);
            ecosystemImgEl.srcset = '';
          }

          if (ecosystemBgEl && data.ecosystemBgImage) {
            ecosystemBgEl.style.backgroundImage = `url('${data.ecosystemBgImage.startsWith('http') ? data.ecosystemBgImage : (BACKEND_URL + data.ecosystemBgImage)}')`;
            ecosystemBgEl.style.backgroundSize = 'cover';
            ecosystemBgEl.style.backgroundPosition = 'center';
          }

          // 8. Community Spotlight
          const sTitleEl = document.getElementById('spotlight-title');
          const sDescWrap = document.getElementById('spotlight-desc-wrap');
          const sTopIconEl = document.getElementById('spotlight-top-icon');
          const sShapeImgEl = document.getElementById('spotlight-shape-img');
          const sBgImgEl = document.getElementById('spotlight-bg-img');

          if (sTitleEl && data.spotlightTitle) sTitleEl.textContent = data.spotlightTitle;

          if (sDescWrap && data.spotlightParagraphs && data.spotlightParagraphs.length > 0) {
            sDescWrap.innerHTML = '';
            data.spotlightParagraphs.forEach(text => {
              if (text && text.trim()) {
                const p = document.createElement('p');
                p.className = 'community-spotlight-description';
                p.innerHTML = text;
                sDescWrap.appendChild(p);
              }
            });
          }

          if (sTopIconEl && data.spotlightTopIcon) {
            sTopIconEl.src = data.spotlightTopIcon.startsWith('http') ? data.spotlightTopIcon : (BACKEND_URL + data.spotlightTopIcon);
            sTopIconEl.srcset = '';
          }

          if (sShapeImgEl && data.spotlightShapeImage) {
            sShapeImgEl.src = data.spotlightShapeImage.startsWith('http') ? data.spotlightShapeImage : (BACKEND_URL + data.spotlightShapeImage);
            sShapeImgEl.srcset = '';
          }

          if (sBgImgEl && data.spotlightBgImage) {
            sBgImgEl.src = data.spotlightBgImage.startsWith('http') ? data.spotlightBgImage : (BACKEND_URL + data.spotlightBgImage);
            sBgImgEl.srcset = '';
          }

          const sPrimaryBtnLink = document.getElementById('spotlight-primary-btn-link');
          const sPrimaryBtnText = document.getElementById('spotlight-primary-btn-text');
          const sPrimaryBtnHoverText = document.getElementById('spotlight-primary-btn-hover-text');
          if (sPrimaryBtnLink && data.spotlightPrimaryBtnLink) sPrimaryBtnLink.href = data.spotlightPrimaryBtnLink;
          if (sPrimaryBtnText && data.spotlightPrimaryBtnText) {
            sPrimaryBtnText.textContent = data.spotlightPrimaryBtnText;
            if (sPrimaryBtnHoverText) sPrimaryBtnHoverText.textContent = data.spotlightPrimaryBtnText;
          }

          const sSecBtnLink = document.getElementById('spotlight-secondary-btn-link');
          const sSecBtnText = document.getElementById('spotlight-secondary-btn-text');
          const sSecBtnHoverText = document.getElementById('spotlight-secondary-btn-hover-text');
          if (sSecBtnLink && data.spotlightSecondaryBtnLink) sSecBtnLink.href = data.spotlightSecondaryBtnLink;
          if (sSecBtnText && data.spotlightSecondaryBtnText) {
            sSecBtnText.textContent = data.spotlightSecondaryBtnText;
            if (sSecBtnHoverText) sSecBtnHoverText.textContent = data.spotlightSecondaryBtnText;
          }

          for (let i = 1; i <= 9; i++) {
            const letterImg = document.getElementById('spotlight-letter-' + i);
            if (letterImg && data['spotlightLetter' + i + 'Image']) {
              letterImg.src = data['spotlightLetter' + i + 'Image'].startsWith('http') ? data['spotlightLetter' + i + 'Image'] : (BACKEND_URL + data['spotlightLetter' + i + 'Image']);
              letterImg.srcset = '';
            }
          }

        }
      } catch (error) {
        console.error('Failed to load dynamic about content:', error);
      }
    })();
  </script>
  <script>
      // Handle footer subscription form submission
      document.addEventListener('DOMContentLoaded', function () {
          const form = document.getElementById('footer-email-form');
          if (form) {
              form.addEventListener('submit', async function (e) {
                  e.preventDefault();
                  
                  const emailInput = document.getElementById('footer-email');
                  if (!emailInput) return;
                  
                  const email = emailInput.value.trim();
                  if (!email) return;
                  
                  const submitBtn = form.querySelector('.footer-subscribe-button');
                  const originalBtnValue = submitBtn ? submitBtn.value : 'Subscribe';
                  
                  if (submitBtn) {
                      submitBtn.value = 'Subscribing...';
                      submitBtn.disabled = true;
                  }
                  
                  const statusEl = document.getElementById('footer-subscribe-status');
                  if (statusEl) {
                      statusEl.style.display = 'none';
                      statusEl.textContent = '';
                  }

                  try {
                      const response = await fetch('http://localhost:5000/api/subscribe', {
                          method: 'POST',
                          headers: {
                              'Content-Type': 'application/json'
                          },
                          body: JSON.stringify({ email: email })
                      });
                      
                      const result = await response.json();
                      
                      if (statusEl) {
                          statusEl.style.display = 'block';
                          if (response.ok && result.success) {
                              statusEl.style.color = '#00ffcc'; // Nice modern success cyan
                              statusEl.textContent = result.message || 'Thank you for subscribing to our newsletter!';
                              emailInput.value = '';
                          } else {
                              statusEl.style.color = '#ff6b6b'; // Nice modern error red
                              statusEl.textContent = result.error || 'Failed to subscribe. Please try again.';
                          }
                      }
                  } catch (error) {
                      console.error('Subscription error:', error);
                      if (statusEl) {
                          statusEl.style.display = 'block';
                          statusEl.style.color = '#ff6b6b';
                          statusEl.textContent = 'Unable to connect to server. Please try again later.';
                      }
                  } finally {
                      if (submitBtn) {
                          submitBtn.value = originalBtnValue;
                          submitBtn.disabled = false;
                      }
                  }
              });
          }
      });
  </script>
